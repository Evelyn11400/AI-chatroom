<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paradox Chatroom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Oxanium:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-deep: #213448;
        --c-mid: #547792;
        --c-light: #94b4c1;
        --c-cream: #ecefca;
        --font-ui: "Oxanium", system-ui, sans-serif;
        --font-display: "Orbitron", system-ui, sans-serif;
        --font-mono: "Share Tech Mono", ui-monospace, monospace;
        font-family: var(--font-ui);
        line-height: 1.45;
        font-feature-settings: "tnum" 1, "ss01" 1;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--c-deep);
        color: var(--c-cream);
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }
      .topbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.65rem 1rem;
        background: var(--c-mid);
        border-bottom: 1px solid var(--c-light);
      }
      .topbar h1 {
        margin: 0;
        font-family: var(--font-display);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .display-badge {
        font-family: var(--font-mono);
        font-size: 0.68rem;
        color: var(--c-light);
        letter-spacing: 0.06em;
        margin-left: 0.5rem;
        font-weight: 400;
      }
      .display-badge:empty {
        display: none;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.3rem 0.65rem;
        border-radius: 999px;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        font-weight: 400;
        letter-spacing: 0.04em;
        border: 1px solid var(--c-light);
        white-space: nowrap;
      }
      .pill i {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
      }
      .pill.disconnected {
        background: var(--c-deep);
        color: var(--c-light);
      }
      .pill.connecting {
        background: var(--c-deep);
        color: var(--c-cream);
      }
      .pill.connected {
        background: #3dd68c;
        color: #0a1f14;
        border-color: #6ef0b2;
        font-weight: 600;
      }
      .pill.connected i {
        background: #0a1f14;
        box-shadow: 0 0 8px rgba(110, 240, 178, 0.9);
      }
      .pill.error {
        background: var(--c-deep);
        color: var(--c-cream);
        border-color: var(--c-cream);
      }
      .mqtt-hidden {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      label {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--c-light);
        display: block;
        margin-bottom: 0.12rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 0.4rem 0.5rem;
        border-radius: 6px;
        border: 1px solid var(--c-light);
        background: var(--c-deep);
        color: var(--c-cream);
        font-size: 0.82rem;
        font-family: inherit;
      }
      button {
        font-family: var(--font-ui);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.4rem 0.7rem;
        border-radius: 6px;
        border: 1px solid var(--c-light);
        background: var(--c-deep);
        color: var(--c-cream);
        font-size: 0.75rem;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background: var(--c-mid);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.primary {
        background: var(--c-cream);
        color: var(--c-deep);
        border-color: var(--c-cream);
      }
      #chat {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        background: var(--c-deep);
      }
      .msg-row {
        display: grid;
        column-gap: 0.65rem;
        align-items: end;
        width: 100%;
        max-width: min(calc(100% - 0.25rem), 92vw, 88rem);
        box-sizing: border-box;
      }
      .msg-row.in,
      .msg-row.ai {
        grid-template-columns: 2.5rem minmax(0, 1fr);
        align-self: flex-start;
      }
      .msg-row.out {
        grid-template-columns: minmax(0, 1fr) 2.5rem;
        width: fit-content;
        align-self: flex-end;
      }
      .msg-row.out .avatar {
        grid-column: 2;
      }
      .msg-row.out .msg {
        grid-column: 1;
        justify-self: end;
      }
      .avatar {
        flex-shrink: 0;
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 50%;
        border: 3px solid #fcf4d4;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0;
        color: rgba(255, 255, 255, 0.96);
        text-shadow: 0 1px 3px rgba(15, 30, 40, 0.45);
      }
      .avatar span {
        line-height: 1;
        user-select: none;
      }
      .msg {
        min-width: 0;
        width: fit-content;
        max-width: 100%;
        padding: 0.65rem 1.05rem;
        border-radius: 12px;
        font-size: 0.92rem;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: normal;
        overflow-wrap: break-word;
        box-sizing: border-box;
      }
      .msg.in {
        background: var(--c-mid);
        border: 1px solid var(--c-light);
        border-bottom-left-radius: 4px;
      }
      .msg.out {
        background: var(--c-deep);
        border: 1px solid var(--c-light);
        border-bottom-right-radius: 4px;
      }
      .msg.ai {
        background: var(--c-mid);
        border: 1px solid var(--c-cream);
        border-bottom-left-radius: 4px;
      }
      .msg.system {
        align-self: center;
        max-width: 96%;
        background: transparent;
        border: 1px dashed var(--c-light);
        color: var(--c-light);
        font-size: 0.78rem;
        text-align: center;
        padding: 0.45rem 0.65rem;
      }
      .composer {
        flex-shrink: 0;
        padding: 0.65rem 1rem;
        border-top: 1px solid var(--c-light);
        background: var(--c-mid);
        display: flex;
        flex-direction: row;
        align-items: flex-end;
        gap: 0.55rem;
      }
      .composer textarea {
        flex: 1 1 auto;
        min-width: 0;
        width: auto;
        min-height: 2.75rem;
        max-height: 10rem;
        resize: vertical;
      }
      .composer .btn-gemini {
        flex-shrink: 0;
        align-self: flex-end;
        height: 2.75rem;
        padding-inline: 0.85rem;
        background: var(--c-deep);
        color: var(--c-cream);
        border-color: var(--c-light);
      }
      .composer .btn-gemini:hover:not(:disabled) {
        background: var(--c-mid);
      }
      .composer .primary {
        flex-shrink: 0;
        align-self: flex-end;
        height: 2.75rem;
        padding-inline: 1rem;
      }
      .name-gate {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(33, 52, 72, 0.88);
        backdrop-filter: blur(6px);
      }
      .name-gate[hidden] {
        display: none !important;
      }
      .name-gate-card {
        width: 100%;
        max-width: 22rem;
        padding: 1.25rem 1.35rem;
        border-radius: 10px;
        border: 1px solid var(--c-light);
        background: var(--c-mid);
        box-shadow: 0 0 0 1px rgba(236, 239, 202, 0.06), 0 18px 48px rgba(0, 0, 0, 0.35);
      }
      .name-gate-title {
        margin: 0 0 0.85rem;
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--c-cream);
      }
      .name-gate-card input {
        margin-bottom: 0.75rem;
      }
      .name-gate-card button.primary {
        width: 100%;
      }

      @media (max-width: 640px) {
        .topbar {
          padding: 0.5rem 0.65rem;
          gap: 0.5rem;
        }
        .topbar h1 {
          font-size: 0.88rem;
          letter-spacing: 0.07em;
        }
        .pill {
          font-size: 0.62rem;
          padding: 0.22rem 0.48rem;
        }
        .display-badge {
          font-size: 0.58rem;
          margin-left: 0.3rem;
        }
        #chat {
          padding: 0.55rem 0.6rem;
          gap: 0.5rem;
        }
        .msg-row {
          max-width: 100%;
          column-gap: 0.45rem;
        }
        .msg-row.in,
        .msg-row.ai {
          grid-template-columns: 2.25rem minmax(0, 1fr);
        }
        .msg-row.out {
          grid-template-columns: minmax(0, 1fr) 2.25rem;
        }
        .avatar {
          width: 2.25rem;
          height: 2.25rem;
          font-size: 0.92rem;
        }
        .msg {
          font-size: 0.88rem;
          padding: 0.5rem 0.8rem;
          border-radius: 10px;
        }
        .composer {
          padding: 0.5rem 0.6rem;
          padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0px));
          gap: 0.45rem;
        }
        .composer textarea {
          font-size: 1rem;
        }
        .composer .btn-gemini {
          min-height: 2.75rem;
          height: auto;
          min-width: 4.25rem;
        }
        .composer .primary {
          min-height: 2.75rem;
          height: auto;
          min-width: 4.5rem;
        }
        .name-gate {
          padding: 0.65rem;
          padding-bottom: max(0.65rem, env(safe-area-inset-bottom, 0px));
        }
        .name-gate-card {
          padding: 1rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="nameGate"
      class="name-gate"
      role="dialog"
      aria-modal="true"
      aria-labelledby="nameGateTitle"
      hidden
    >
      <div class="name-gate-card">
        <h2 id="nameGateTitle" class="name-gate-title">Identity</h2>
        <label for="displayNameInput">Display name</label>
        <input
          id="displayNameInput"
          type="text"
          maxlength="32"
          spellcheck="false"
          autocomplete="nickname"
        />
        <button type="button" class="primary" id="btnNameContinue">Continue</button>
      </div>
    </div>

    <header class="topbar">
      <h1>Paradox Chatroom<span class="display-badge" id="displayBadge"></span></h1>
      <span class="pill disconnected" id="pill" title="Connection"
        ><i></i> <span id="pillText">Disconnected</span></span
      >
    </header>

    <div class="mqtt-hidden" aria-hidden="true">
      <input id="mqttUrl" type="text" tabindex="-1" autocomplete="off" />
      <input id="mqttUser" type="text" tabindex="-1" autocomplete="off" />
      <input id="mqttPass" type="password" tabindex="-1" autocomplete="off" />
      <input id="mqttTopic" type="text" tabindex="-1" autocomplete="off" />
    </div>

    <div id="chat" aria-live="polite"></div>

    <div class="composer">
      <textarea
        id="composerInput"
        rows="2"
        placeholder="Message…"
        disabled
      ></textarea>
      <button type="button" class="btn-gemini" id="btnGemini" disabled>Gemini</button>
      <button type="button" class="primary" id="btnSend" disabled>Send</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js" crossorigin="anonymous"></script>
    <script>
      (function () {
        var STORAGE_NAME = "paradox_display_name";
        var client = null;
        var clientId = "";

        function $(id) {
          return document.getElementById(id);
        }

        var chatEl = $("chat");
        var pillEl = $("pill");
        var pillTextEl = $("pillText");
        var composerInput = $("composerInput");
        var nameGateEl = $("nameGate");
        var displayBadgeEl = $("displayBadge");

        var geminiApiKey = "";
        var geminiModel = "gemini-2.0-flash";

        var BUILTIN_MQTT = {
          brokerUrl: "wss://2ec7c29478854652aefa31c92c09f792.s1.eu.hivemq.cloud:8884/mqtt",
          username: "test2",
          password: "Aa123456",
          topic: "blackout/mqtest/chat",
        };

        function loadGeminiConfig() {
          return fetch("./gemini-config.local.json", { cache: "no-store" })
            .then(function (r) {
              return r.ok ? r.json() : null;
            })
            .catch(function () {
              return null;
            })
            .then(function (cfg) {
              if (cfg && typeof cfg.apiKey === "string" && cfg.apiKey.trim())
                geminiApiKey = cfg.apiKey.trim();
              if (cfg && typeof cfg.model === "string" && cfg.model.trim())
                geminiModel = cfg.model.trim();
              return fetch("./gemini-config.json", { cache: "no-store" });
            })
            .then(function (r) {
              return r && r.ok ? r.json() : null;
            })
            .catch(function () {
              return null;
            })
            .then(function (cfg) {
              if (!cfg || typeof cfg !== "object") return;
              if (typeof cfg.apiKey === "string" && cfg.apiKey.trim() && !geminiApiKey)
                geminiApiKey = cfg.apiKey.trim();
              if (typeof cfg.model === "string" && cfg.model.trim()) geminiModel = cfg.model.trim();
            });
        }

        function applyMqttCfg(cfg, onlyFillEmpty) {
          if (!cfg || typeof cfg !== "object") return;
          function setField(id, val) {
            if (val == null || val === "") return;
            var s = typeof val === "string" ? val : String(val);
            if (!s.trim()) return;
            var el = $(id);
            if (!el) return;
            if (onlyFillEmpty && String(el.value).trim()) return;
            el.value = s;
          }
          if (cfg.brokerUrl != null) setField("mqttUrl", String(cfg.brokerUrl).trim());
          if (cfg.username != null) setField("mqttUser", cfg.username);
          if (cfg.password != null) setField("mqttPass", cfg.password);
          if (cfg.topic != null) setField("mqttTopic", String(cfg.topic).trim());
        }

        function loadMqttConfigs() {
          return fetch("./mqtt-config.local.json", { cache: "no-store" })
            .then(function (r) {
              return r.ok ? r.json() : null;
            })
            .catch(function () {
              return null;
            })
            .then(function (cfg) {
              applyMqttCfg(cfg || {}, false);
              return fetch("./mqtt-config.json", { cache: "no-store" });
            })
            .then(function (r) {
              return r && r.ok ? r.json() : null;
            })
            .catch(function () {
              return null;
            })
            .then(function (cfg) {
              applyMqttCfg(cfg || {}, true);
              applyMqttCfg(BUILTIN_MQTT, true);
            });
        }

        function whenMqttReady(fn) {
          if (typeof mqtt !== "undefined") {
            fn();
            return;
          }
          var n = 0;
          var t = setInterval(function () {
            n++;
            if (typeof mqtt !== "undefined") {
              clearInterval(t);
              fn();
            }
            if (n > 200) clearInterval(t);
          }, 50);
        }

        function tryAutoConnect() {
          if (typeof mqtt === "undefined") return;
          if (client && client.connected) return;
          var url = $("mqttUrl").value.trim();
          var topic = getTopic();
          if (!url || !topic) return;
          mqttConnect();
        }

        function getDisplayName() {
          try {
            return String(localStorage.getItem(STORAGE_NAME) || "").trim();
          } catch (e) {
            return "";
          }
        }

        function setDisplayName(name) {
          try {
            localStorage.setItem(STORAGE_NAME, name);
          } catch (e) {}
        }

        function syncDisplayBadge() {
          var n = getDisplayName();
          displayBadgeEl.textContent = n ? " · " + n : "";
        }

        function openNameGate() {
          nameGateEl.removeAttribute("hidden");
          var inp = $("displayNameInput");
          inp.value = getDisplayName();
          requestAnimationFrame(function () {
            inp.focus();
            inp.select();
          });
        }

        function closeNameGate() {
          nameGateEl.setAttribute("hidden", "");
        }

        function submitDisplayName() {
          var v = $("displayNameInput").value.trim();
          if (!v) {
            $("displayNameInput").focus();
            return;
          }
          if (v.length > 32) v = v.slice(0, 32);
          setDisplayName(v);
          syncDisplayBadge();
          closeNameGate();
          tryAutoConnect();
        }

        if (!getDisplayName()) openNameGate();
        else syncDisplayBadge();

        $("btnNameContinue").addEventListener("click", submitDisplayName);
        $("displayNameInput").addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            submitDisplayName();
          }
        });

        function setPill(state) {
          pillEl.className = "pill " + state;
          pillTextEl.textContent =
            state === "connected"
              ? "Connected"
              : state === "connecting"
                ? "Connecting…"
                : state === "error"
                  ? "MQTT error"
                  : "Disconnected";
        }

        var lastSentBody = "";
        var lastSentAt = 0;

        function setComposerEnabled(on) {
          $("btnSend").disabled = !on;
          $("btnGemini").disabled = !on || !geminiApiKey;
          composerInput.disabled = !on;
        }

        function errString(err) {
          if (!err) return "(no message)";
          if (typeof err === "string") return err;
          var parts = [];
          if (err.message) parts.push(err.message);
          if (err.code != null) parts.push("code=" + err.code);
          return parts.length ? parts.join(" | ") : String(err);
        }

        function hashStr(s) {
          var t = String(s || "");
          var h = 5381;
          for (var i = 0; i < t.length; i++) h = ((h << 5) + h + t.charCodeAt(i)) | 0;
          return Math.abs(h);
        }

        function firstInitial(name) {
          var t = String(name || "").trim();
          if (!t) return "?";
          var cp = t.codePointAt(0);
          var ch = String.fromCodePoint(cp);
          return ch.toLocaleUpperCase();
        }

        function avatarSolidColorForUser(userKey) {
          var h = hashStr(String(userKey || "?"));
          var hue = 204 + (h % 26);
          var sat = 14 + ((h >> 4) % 14);
          var lit = 38 + ((h >> 7) % 16);
          return "hsl(" + hue + ", " + sat + "%, " + lit + "%)";
        }

        function makeAvatarEl(userKey) {
          var el = document.createElement("div");
          el.className = "avatar";
          el.setAttribute("aria-hidden", "true");
          el.style.background = avatarSolidColorForUser(userKey);
          var span = document.createElement("span");
          span.textContent = firstInitial(userKey);
          el.appendChild(span);
          return el;
        }

        function appendMessageWithAvatar(kind, body, userKey) {
          var row = document.createElement("div");
          row.className = "msg-row " + kind;
          row.appendChild(makeAvatarEl(userKey));
          var bubble = document.createElement("div");
          bubble.className = "msg " + kind;
          bubble.textContent = body;
          row.appendChild(bubble);
          chatEl.appendChild(row);
          chatEl.scrollTop = chatEl.scrollHeight;
        }

        function appendChat(kind, meta, body) {
          if (kind === "system") {
            var div = document.createElement("div");
            div.className = "msg system";
            div.textContent = body;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
            return;
          }
          appendMessageWithAvatar(kind, body, meta);
        }

        function appendOutgoingChat(body, userKey) {
          var row = document.createElement("div");
          row.className = "msg-row out";
          row.appendChild(makeAvatarEl(userKey));
          var bubble = document.createElement("div");
          bubble.className = "msg out";
          bubble.textContent = body;
          row.appendChild(bubble);
          chatEl.appendChild(row);
          chatEl.scrollTop = chatEl.scrollHeight;
          return {
            setDelivered: function () {},
            setFailed: function (msg) {
              appendChat("system", "", msg || "Send failed");
            },
          };
        }

        function parseIncomingPayload(raw) {
          var text = raw.toString();
          try {
            var o = JSON.parse(text);
            if (o && o.t === "msg" && typeof o.text === "string")
              return { kind: "in", from: o.from || "?", text: o.text };
            if (o && o.t === "ai" && typeof o.text === "string")
              return { kind: "ai", model: o.model || "", text: o.text };
          } catch (e) {}
          return { kind: "in", from: "raw", text: text };
        }

        function buildUserPayload(text) {
          var who = getDisplayName() || clientId;
          return JSON.stringify({ t: "msg", from: who, text: text });
        }

        function buildAiPayload(text, model) {
          return JSON.stringify({ t: "ai", model: model || "", text: text });
        }

        function getTopic() {
          return $("mqttTopic").value.trim();
        }

        function publishJson(topic, displayText, jsonBody, bubbleLabel) {
          if (!client || !client.connected) return;
          var bubble = appendOutgoingChat(displayText, bubbleLabel);
          lastSentBody = jsonBody;
          lastSentAt = Date.now();
          client.publish(topic, jsonBody, { qos: 1 }, function (err) {
            if (err) {
              setPill("error");
              bubble.setFailed(errString(err));
            } else {
              bubble.setDelivered();
            }
          });
        }

        function wireClientEvents(topic) {
          client.on("message", function (t, payload) {
            var parsed = parseIncomingPayload(payload);
            if (parsed.kind === "in" || parsed.kind === "ai") {
              var rawStr = payload.toString();
              if (rawStr === lastSentBody && Date.now() - lastSentAt < 2500) return;
            }
            if (parsed.kind === "ai") {
              appendMessageWithAvatar("ai", parsed.text, "AI");
            } else {
              appendMessageWithAvatar("in", parsed.text, parsed.from);
            }
          });

          client.on("error", function (err) {
            setPill("error");
          });

          client.on("close", function () {
            setPill("disconnected");
            setComposerEnabled(false);
            client = null;
          });

          client.on("offline", function () {});
        }

        function mqttConnect() {
          if (typeof mqtt === "undefined") {
            setPill("error");
            return;
          }
          var url = $("mqttUrl").value.trim();
          var user = $("mqttUser").value;
          var pass = $("mqttPass").value;
          var topic = getTopic();
          if (!url || !topic) {
            appendChat("system", "", "WSS URL and topic required.");
            return;
          }
          if (client) {
            try {
              client.end(true);
            } catch (e) {}
            client = null;
          }
          clientId = "web-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now();
          setPill("connecting");

          client = mqtt.connect(url, {
            username: user || undefined,
            password: pass || undefined,
            clientId: clientId,
            clean: true,
            reconnectPeriod: 0,
            keepalive: 60,
            connectTimeout: 30 * 1000,
            protocolVersion: 4,
          });

          client.on("connect", function () {
            setPill("connected");
            setComposerEnabled(true);
            client.subscribe(topic, { qos: 1 }, function (err) {
              if (err) {
                setPill("error");
                appendChat("system", "", errString(err));
              }
            });
          });

          wireClientEvents(topic);
        }

        function doSend() {
          var topic = getTopic();
          if (!client || !client.connected || !topic) return;
          var payload = composerInput.value;
          if (!payload.trim()) return;
          var jsonBody = buildUserPayload(payload);
          composerInput.value = "";
          publishJson(topic, payload, jsonBody, getDisplayName() || "You");
        }

        $("btnSend").addEventListener("click", doSend);
        composerInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            doSend();
          }
        });

        async function callGemini(prompt) {
          if (!geminiApiKey) {
            throw new Error(
              "No Gemini API key. Copy gemini-config.example.json to gemini-config.local.json and add your key."
            );
          }
          var model = geminiModel || "gemini-2.0-flash";
          var url =
            "https://generativelanguage.googleapis.com/v1beta/models/" +
            encodeURIComponent(model) +
            ":generateContent?key=" +
            encodeURIComponent(geminiApiKey);
          var systemText =
            "You are replying in a public group chat (MQTT). The user message is their instruction or question to you.\n\n" +
            "Rules:\n" +
            "- Write ONLY the message you would send as a chat bubble: natural, casual, human chat tone.\n" +
            "- Do NOT show your thinking, planning, step-by-step reasoning, or analysis.\n" +
            "- Do NOT use phrases like \"Here is\", \"I'll\", \"Sure, I can\", \"As an AI\", apologies, or meta talk about the task.\n" +
            "- Do NOT add unrelated filler, disclaimers, or closing remarks unless they fit normal chat.\n" +
            "- No markdown headings or lecture format unless the user clearly wants that in a chatty way.\n" +
            "- Keep it concise like instant messaging unless the user explicitly asks for a longer answer.\n" +
            "- Plain text only, ready to broadcast as one chat line.";

          var r = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              systemInstruction: { parts: [{ text: systemText }] },
              contents: [{ role: "user", parts: [{ text: prompt }] }],
            }),
          });
          var data = await r.json().catch(function () {
            return {};
          });
          if (!r.ok) {
            var msg = data.error && data.error.message ? data.error.message : "HTTP " + r.status;
            throw new Error(msg);
          }
          var parts = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts;
          var text = Array.isArray(parts)
            ? parts
                .map(function (p) {
                  return typeof p.text === "string" ? p.text : "";
                })
                .join("")
            : "";
          if (!text.trim()) throw new Error("Empty model response.");
          return { text: text, model: model };
        }

        $("btnGemini").addEventListener("click", async function () {
          if (!client || !client.connected) return;
          var topic = getTopic();
          var q = composerInput.value.trim();
          if (!q) return;
          $("btnGemini").disabled = true;
          try {
            var out = await callGemini(q);
            composerInput.value = "";
            var jsonBody = buildAiPayload(out.text, out.model);
            publishJson(topic, out.text, jsonBody, "AI");
          } catch (e) {
            appendChat("system", "", errString(e));
          } finally {
            $("btnGemini").disabled = !client || !client.connected || !geminiApiKey;
          }
        });

        Promise.all([loadMqttConfigs(), loadGeminiConfig()]).then(function () {
          whenMqttReady(function () {
            tryAutoConnect();
          });
        });
      })();
    </script>
  </body>
</html>
