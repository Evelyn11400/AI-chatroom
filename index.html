<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Paradox Chatroom</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Oxanium:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-deep: #213448;
        --c-mid: #547792;
        --c-light: #94b4c1;
        --c-cream: #ecefca;
        --font-ui: "Oxanium", system-ui, sans-serif;
        --font-display: "Orbitron", system-ui, sans-serif;
        --font-mono: "Share Tech Mono", ui-monospace, monospace;
        font-family: var(--font-ui);
        line-height: 1.45;
        font-feature-settings: "tnum" 1, "ss01" 1;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--c-deep);
        color: var(--c-cream);
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }
      .topbar {
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 0.65rem 1rem;
        background: var(--c-mid);
        border-bottom: 1px solid var(--c-light);
      }
      .topbar h1 {
        margin: 0;
        font-family: var(--font-display);
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .display-badge {
        font-family: var(--font-mono);
        font-size: 0.68rem;
        color: var(--c-light);
        letter-spacing: 0.06em;
        margin-left: 0.5rem;
        font-weight: 400;
      }
      .display-badge:empty {
        display: none;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.3rem 0.65rem;
        border-radius: 999px;
        font-family: var(--font-mono);
        font-size: 0.72rem;
        font-weight: 400;
        letter-spacing: 0.04em;
        border: 1px solid var(--c-light);
        white-space: nowrap;
      }
      .pill i {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
      }
      .pill.disconnected {
        background: var(--c-deep);
        color: var(--c-light);
      }
      .pill.connecting {
        background: var(--c-deep);
        color: var(--c-cream);
      }
      .pill.connected {
        background: #3dd68c;
        color: #0a1f14;
        border-color: #6ef0b2;
        font-weight: 600;
      }
      .pill.connected i {
        background: #0a1f14;
        box-shadow: 0 0 8px rgba(110, 240, 178, 0.9);
      }
      .pill.error {
        background: var(--c-deep);
        color: var(--c-cream);
        border-color: var(--c-cream);
      }
      details.settings {
        flex-shrink: 0;
        border-bottom: 1px solid var(--c-light);
        background: var(--c-mid);
      }
      details.settings > summary {
        list-style: none;
        cursor: pointer;
        padding: 0.45rem 1rem;
        font-size: 0.78rem;
        color: var(--c-cream);
        user-select: none;
      }
      details.settings > summary::-webkit-details-marker {
        display: none;
      }
      .settings-inner {
        padding: 0 1rem 0.65rem;
        display: grid;
        gap: 0.45rem;
      }
      label {
        font-family: var(--font-mono);
        font-size: 0.65rem;
        color: var(--c-light);
        display: block;
        margin-bottom: 0.12rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      input,
      textarea,
      select {
        width: 100%;
        padding: 0.4rem 0.5rem;
        border-radius: 6px;
        border: 1px solid var(--c-light);
        background: var(--c-deep);
        color: var(--c-cream);
        font-size: 0.82rem;
        font-family: inherit;
      }
      .row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.45rem;
      }
      @media (max-width: 520px) {
        .row2 {
          grid-template-columns: 1fr;
        }
      }
      .settings-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.45rem;
        margin-top: 0.2rem;
      }
      button {
        font-family: var(--font-ui);
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        padding: 0.4rem 0.7rem;
        border-radius: 6px;
        border: 1px solid var(--c-light);
        background: var(--c-deep);
        color: var(--c-cream);
        font-size: 0.75rem;
        cursor: pointer;
      }
      button:hover:not(:disabled) {
        background: var(--c-mid);
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      button.primary {
        background: var(--c-cream);
        color: var(--c-deep);
        border-color: var(--c-cream);
      }
      button.ghost {
        background: transparent;
      }
      #chat {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
        background: var(--c-deep);
      }
      .msg {
        max-width: min(92%, 40rem);
        padding: 0.55rem 0.75rem;
        border-radius: 12px;
        font-size: 0.92rem;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .msg.in {
        align-self: flex-start;
        background: var(--c-mid);
        border: 1px solid var(--c-light);
        border-bottom-left-radius: 4px;
      }
      .msg.out {
        align-self: flex-end;
        background: var(--c-deep);
        border: 1px solid var(--c-light);
        border-bottom-right-radius: 4px;
      }
      .msg.ai {
        align-self: flex-start;
        background: var(--c-mid);
        border: 1px solid var(--c-cream);
        border-bottom-left-radius: 4px;
      }
      .msg .meta {
        font-size: 0.68rem;
        color: var(--c-light);
        margin-bottom: 0.25rem;
        font-family: var(--font-mono);
        letter-spacing: 0.03em;
      }
      .msg .ack {
        font-weight: 600;
      }
      .msg .ack.pending {
        color: var(--c-light);
      }
      .msg .ack.ok {
        color: var(--c-cream);
      }
      .msg .ack.fail {
        color: var(--c-cream);
        opacity: 0.85;
      }
      .msg.system {
        align-self: center;
        max-width: 96%;
        background: transparent;
        border: 1px dashed var(--c-light);
        color: var(--c-light);
        font-size: 0.78rem;
        text-align: center;
      }
      .composer {
        flex-shrink: 0;
        padding: 0.65rem 1rem;
        border-top: 1px solid var(--c-light);
        background: var(--c-mid);
        display: flex;
        flex-direction: column;
        gap: 0.45rem;
      }
      .composer textarea {
        min-height: 3rem;
        max-height: 10rem;
        resize: vertical;
      }
      .composer .actions {
        display: flex;
        gap: 0.45rem;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
      .name-gate {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background: rgba(33, 52, 72, 0.88);
        backdrop-filter: blur(6px);
      }
      .name-gate[hidden] {
        display: none !important;
      }
      .name-gate-card {
        width: 100%;
        max-width: 22rem;
        padding: 1.25rem 1.35rem;
        border-radius: 10px;
        border: 1px solid var(--c-light);
        background: var(--c-mid);
        box-shadow: 0 0 0 1px rgba(236, 239, 202, 0.06), 0 18px 48px rgba(0, 0, 0, 0.35);
      }
      .name-gate-title {
        margin: 0 0 0.85rem;
        font-family: var(--font-display);
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--c-cream);
      }
      .name-gate-card input {
        margin-bottom: 0.75rem;
      }
      .name-gate-card button.primary {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div
      id="nameGate"
      class="name-gate"
      role="dialog"
      aria-modal="true"
      aria-labelledby="nameGateTitle"
      hidden
    >
      <div class="name-gate-card">
        <h2 id="nameGateTitle" class="name-gate-title">Identity</h2>
        <label for="displayNameInput">Display name</label>
        <input
          id="displayNameInput"
          type="text"
          maxlength="32"
          spellcheck="false"
          autocomplete="nickname"
        />
        <button type="button" class="primary" id="btnNameContinue">Continue</button>
      </div>
    </div>

    <header class="topbar">
      <h1>Paradox Chatroom<span class="display-badge" id="displayBadge"></span></h1>
      <span class="pill disconnected" id="pill" title="MQTT"
        ><i></i> <span id="pillText">Disconnected</span></span
      >
    </header>

    <details class="settings">
      <summary>Settings</summary>
      <div class="settings-inner">
        <div>
          <label for="mqttUrl">Broker WSS URL</label>
          <input id="mqttUrl" type="text" spellcheck="false" autocomplete="off" />
        </div>
        <div class="row2">
          <div>
            <label for="mqttUser">Username</label>
            <input id="mqttUser" type="text" autocomplete="username" />
          </div>
          <div>
            <label for="mqttPass">Password</label>
            <input id="mqttPass" type="password" autocomplete="current-password" />
          </div>
        </div>
        <div>
          <label for="mqttTopic">Topic</label>
          <input id="mqttTopic" type="text" spellcheck="false" autocomplete="off" placeholder="shared topic" />
        </div>
        <div class="settings-actions">
          <button type="button" class="primary" id="btnMqttConnect">Connect</button>
          <button type="button" id="btnMqttDisconnect">Disconnect</button>
          <button type="button" class="ghost" id="btnClearChat">Clear</button>
        </div>
        <div>
          <label for="geminiMode">Gemini</label>
          <select id="geminiMode">
            <option value="direct">Direct (Google)</option>
            <option value="gateway">Gateway URL</option>
          </select>
        </div>
        <div id="wrapGateway" style="display: none">
          <label for="gatewayUrl">Gateway URL</label>
          <input id="gatewayUrl" type="url" autocomplete="off" />
        </div>
        <div id="wrapDirect">
          <div class="row2">
            <div>
              <label for="geminiKey">API key</label>
              <input id="geminiKey" type="password" autocomplete="off" />
            </div>
            <div>
              <label for="geminiModel">Model</label>
              <input id="geminiModel" type="text" value="gemini-2.0-flash" spellcheck="false" />
            </div>
          </div>
        </div>
      </div>
    </details>

    <div id="chat" aria-live="polite"></div>

    <div class="composer">
      <textarea
        id="composerInput"
        rows="2"
        placeholder="Message…"
        disabled
      ></textarea>
      <div class="actions">
        <button type="button" id="btnGemini" disabled>Gemini</button>
        <button type="button" class="primary" id="btnSend" disabled>Send</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.3/dist/mqtt.min.js" crossorigin="anonymous"></script>
    <script>
      (function () {
        var STORAGE_NAME = "paradox_display_name";
        var client = null;
        var clientId = "";

        function $(id) {
          return document.getElementById(id);
        }

        var chatEl = $("chat");
        var pillEl = $("pill");
        var pillTextEl = $("pillText");
        var composerInput = $("composerInput");
        var nameGateEl = $("nameGate");
        var displayBadgeEl = $("displayBadge");

        function loadMqttLocalConfig() {
          return fetch("./mqtt-config.local.json", { cache: "no-store" })
            .then(function (r) {
              if (!r.ok) return null;
              return r.json();
            })
            .then(function (cfg) {
              if (!cfg || typeof cfg !== "object") return;
              if (typeof cfg.brokerUrl === "string" && cfg.brokerUrl.trim())
                $("mqttUrl").value = cfg.brokerUrl.trim();
              if (typeof cfg.username === "string") $("mqttUser").value = cfg.username;
              if (typeof cfg.password === "string") $("mqttPass").value = cfg.password;
              if (typeof cfg.topic === "string" && cfg.topic.trim())
                $("mqttTopic").value = cfg.topic.trim();
            })
            .catch(function () {});
        }

        function isNameGateClosed() {
          return nameGateEl.hasAttribute("hidden");
        }

        function tryAutoConnect() {
          if (!isNameGateClosed()) return;
          if (typeof mqtt === "undefined") return;
          if (client && client.connected) return;
          var url = $("mqttUrl").value.trim();
          var topic = getTopic();
          if (!url || !topic) return;
          if (!getDisplayName()) return;
          mqttConnect();
        }

        function getDisplayName() {
          try {
            return String(localStorage.getItem(STORAGE_NAME) || "").trim();
          } catch (e) {
            return "";
          }
        }

        function setDisplayName(name) {
          try {
            localStorage.setItem(STORAGE_NAME, name);
          } catch (e) {}
        }

        function syncDisplayBadge() {
          var n = getDisplayName();
          displayBadgeEl.textContent = n ? " · " + n : "";
        }

        function openNameGate() {
          nameGateEl.removeAttribute("hidden");
          var inp = $("displayNameInput");
          inp.value = getDisplayName();
          requestAnimationFrame(function () {
            inp.focus();
            inp.select();
          });
        }

        function closeNameGate() {
          nameGateEl.setAttribute("hidden", "");
        }

        function submitDisplayName() {
          var v = $("displayNameInput").value.trim();
          if (!v) {
            $("displayNameInput").focus();
            return;
          }
          if (v.length > 32) v = v.slice(0, 32);
          setDisplayName(v);
          syncDisplayBadge();
          closeNameGate();
          tryAutoConnect();
        }

        if (!getDisplayName()) openNameGate();
        else syncDisplayBadge();

        $("btnNameContinue").addEventListener("click", submitDisplayName);
        $("displayNameInput").addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            e.preventDefault();
            submitDisplayName();
          }
        });

        function setPill(state) {
          pillEl.className = "pill " + state;
          pillTextEl.textContent =
            state === "connected"
              ? "MQTT connected"
              : state === "connecting"
                ? "Connecting…"
                : state === "error"
                  ? "MQTT error"
                  : "Disconnected";
        }

        var lastSentBody = "";
        var lastSentAt = 0;

        function setComposerEnabled(on) {
          $("btnSend").disabled = !on;
          $("btnGemini").disabled = !on;
          composerInput.disabled = !on;
        }

        function errString(err) {
          if (!err) return "(no message)";
          if (typeof err === "string") return err;
          var parts = [];
          if (err.message) parts.push(err.message);
          if (err.code != null) parts.push("code=" + err.code);
          return parts.length ? parts.join(" | ") : String(err);
        }

        function appendChat(kind, meta, body) {
          var div = document.createElement("div");
          div.className = "msg " + kind;
          if (kind === "system") {
            div.textContent = body;
          } else {
            var m = document.createElement("div");
            m.className = "meta";
            m.textContent = meta;
            div.appendChild(m);
            var b = document.createElement("div");
            b.textContent = body;
            div.appendChild(b);
          }
          chatEl.appendChild(div);
          chatEl.scrollTop = chatEl.scrollHeight;
        }

        function appendOutgoingChat(topic, body, label) {
          var div = document.createElement("div");
          div.className = "msg out";
          var meta = document.createElement("div");
          meta.className = "meta";
          var ack = document.createElement("span");
          ack.className = "ack pending";
          ack.textContent = "Pending…";
          meta.appendChild(document.createTextNode((label || "You") + " · " + topic + " · "));
          meta.appendChild(ack);
          div.appendChild(meta);
          var b = document.createElement("div");
          b.textContent = body;
          div.appendChild(b);
          chatEl.appendChild(div);
          chatEl.scrollTop = chatEl.scrollHeight;
          return {
            setDelivered: function () {
              ack.className = "ack ok";
              ack.textContent = "Delivered";
            },
            setFailed: function (msg) {
              ack.className = "ack fail";
              ack.textContent = "Failed — " + (msg || "publish error");
            },
          };
        }

        function parseIncomingPayload(raw) {
          var text = raw.toString();
          try {
            var o = JSON.parse(text);
            if (o && o.t === "msg" && typeof o.text === "string")
              return { kind: "in", from: o.from || "?", text: o.text };
            if (o && o.t === "ai" && typeof o.text === "string")
              return { kind: "ai", model: o.model || "", text: o.text };
          } catch (e) {}
          return { kind: "in", from: "raw", text: text };
        }

        function buildUserPayload(text) {
          var who = getDisplayName() || clientId;
          return JSON.stringify({ t: "msg", from: who, text: text });
        }

        function buildAiPayload(text, model) {
          return JSON.stringify({ t: "ai", model: model || "", text: text });
        }

        function getTopic() {
          return $("mqttTopic").value.trim();
        }

        function publishJson(topic, displayText, jsonBody, bubbleLabel) {
          if (!client || !client.connected) return;
          var bubble = appendOutgoingChat(topic, displayText, bubbleLabel);
          lastSentBody = jsonBody;
          lastSentAt = Date.now();
          client.publish(topic, jsonBody, { qos: 1 }, function (err) {
            if (err) {
              setPill("error");
              bubble.setFailed(errString(err));
            } else {
              bubble.setDelivered();
            }
          });
        }

        function wireClientEvents(topic) {
          client.on("message", function (t, payload) {
            var parsed = parseIncomingPayload(payload);
            if (parsed.kind === "in" || parsed.kind === "ai") {
              var rawStr = payload.toString();
              if (rawStr === lastSentBody && Date.now() - lastSentAt < 2500) return;
            }
            if (parsed.kind === "ai") {
              appendChat(
                "ai",
                "Gemini" + (parsed.model ? " · " + parsed.model : "") + " · " + t,
                parsed.text
              );
            } else {
              appendChat("in", parsed.from + " · " + t, parsed.text);
            }
          });

          client.on("error", function (err) {
            setPill("error");
          });

          client.on("close", function () {
            setPill("disconnected");
            setComposerEnabled(false);
            client = null;
          });

          client.on("offline", function () {});
        }

        function mqttConnect() {
          if (typeof mqtt === "undefined") {
            setPill("error");
            return;
          }
          var url = $("mqttUrl").value.trim();
          var user = $("mqttUser").value;
          var pass = $("mqttPass").value;
          var topic = getTopic();
          if (!url || !topic) {
            appendChat("system", "", "WSS URL and topic required.");
            return;
          }
          if (client) {
            try {
              client.end(true);
            } catch (e) {}
            client = null;
          }
          clientId = "web-" + Math.random().toString(36).slice(2, 10) + "-" + Date.now();
          setPill("connecting");

          client = mqtt.connect(url, {
            username: user || undefined,
            password: pass || undefined,
            clientId: clientId,
            clean: true,
            reconnectPeriod: 0,
            keepalive: 60,
            connectTimeout: 30 * 1000,
            protocolVersion: 4,
          });

          client.on("connect", function () {
            setPill("connected");
            setComposerEnabled(true);
            client.subscribe(topic, { qos: 1 }, function (err) {
              if (err) {
                setPill("error");
                appendChat("system", "", errString(err));
              }
            });
          });

          wireClientEvents(topic);
        }

        function mqttDisconnect() {
          if (client) {
            try {
              client.end(true);
            } catch (e) {}
            client = null;
          }
          setPill("disconnected");
          setComposerEnabled(false);
        }

        $("geminiMode").addEventListener("change", function () {
          var g = $("geminiMode").value === "gateway";
          $("wrapGateway").style.display = g ? "block" : "none";
          $("wrapDirect").style.display = g ? "none" : "block";
        });
        $("geminiMode").dispatchEvent(new Event("change"));

        $("btnMqttConnect").addEventListener("click", mqttConnect);
        $("btnMqttDisconnect").addEventListener("click", mqttDisconnect);

        $("btnClearChat").addEventListener("click", function () {
          chatEl.innerHTML = "";
        });

        function doSend() {
          var topic = getTopic();
          if (!client || !client.connected || !topic) return;
          var payload = composerInput.value;
          if (!payload.trim()) return;
          var jsonBody = buildUserPayload(payload);
          composerInput.value = "";
          publishJson(topic, payload, jsonBody, getDisplayName() || "You");
        }

        $("btnSend").addEventListener("click", doSend);
        composerInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            doSend();
          }
        });

        async function callGemini(prompt) {
          var mode = $("geminiMode").value;
          if (mode === "gateway") {
            var gw = $("gatewayUrl").value.trim();
            if (!gw) throw new Error("Gateway URL required.");
            var r = await fetch(gw, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ prompt: prompt }),
            });
            var data = await r.json().catch(function () {
              return {};
            });
            if (!r.ok) throw new Error(data.error || "HTTP " + r.status);
            var text = data.text != null ? String(data.text) : "";
            if (!text.trim()) throw new Error("Missing text in response.");
            return { text: text, model: data.model || "gateway" };
          }

          var key = $("geminiKey").value.trim();
          var model = $("geminiModel").value.trim() || "gemini-2.0-flash";
          if (!key) throw new Error("API key required or use gateway.");

          var url =
            "https://generativelanguage.googleapis.com/v1beta/models/" +
            encodeURIComponent(model) +
            ":generateContent?key=" +
            encodeURIComponent(key);

          var r2 = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ role: "user", parts: [{ text: prompt }] }],
            }),
          });
          var data2 = await r2.json().catch(function () {
            return {};
          });
          if (!r2.ok) {
            var msg = data2.error && data2.error.message ? data2.error.message : "HTTP " + r2.status;
            throw new Error(msg);
          }
          var parts = data2.candidates && data2.candidates[0] && data2.candidates[0].content && data2.candidates[0].content.parts;
          var text2 = Array.isArray(parts)
            ? parts
                .map(function (p) {
                  return typeof p.text === "string" ? p.text : "";
                })
                .join("")
            : "";
          if (!text2.trim()) throw new Error("Empty model output.");
          return { text: text2, model: model };
        }

        $("btnGemini").addEventListener("click", async function () {
          if (!client || !client.connected) return;
          var topic = getTopic();
          var q = composerInput.value.trim();
          if (!q) return;
          $("btnGemini").disabled = true;
          try {
            var out = await callGemini(q);
            composerInput.value = "";
            var jsonBody = buildAiPayload(out.text, out.model);
            publishJson(topic, out.text, jsonBody, "Gemini");
          } catch (e) {
            appendChat("system", "", errString(e));
          } finally {
            $("btnGemini").disabled = !client || !client.connected;
          }
        });

        loadMqttLocalConfig().then(function () {
          tryAutoConnect();
        });
      })();
    </script>
  </body>
</html>
